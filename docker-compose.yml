services:
  db:
    image: postgres:15-alpine
    container_name: minecraft_guessr_db
    environment:
      POSTGRES_DB: minecraft_guessr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: minecraft_guessr_backend
    ports:
      - "5080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=minecraft_guessr;Username=postgres;Password=password
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - db
    volumes:
      - ./recipe:/app/recipe:ro
      - ./texture-block:/app/texture-block:ro
      - ./texture-item:/app/texture-item:ro

volumes:
  postgres_data:
